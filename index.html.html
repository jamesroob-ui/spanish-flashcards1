<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Spanish Flashcards</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e1117;
    --surface: #181d27;
    --surface2: #1f2636;
    --border: rgba(255,255,255,0.08);
    --text: #f0ece4;
    --muted: #7a8499;
    --accent: #e8b84b;
    --accent2: #5bb8a0;
    --accent3: #c47ab4;
    --danger: #e06b6b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; overflow-x: hidden; }

  body {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    background-image: radial-gradient(ellipse at 20% 10%, rgba(232,184,75,0.07) 0%, transparent 50%),
                      radial-gradient(ellipse at 80% 90%, rgba(91,184,160,0.06) 0%, transparent 50%);
  }

  header {
    padding: 1.2rem 1.5rem 0.8rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 0.5px solid var(--border);
  }
  .logo { font-family: 'Fraunces', serif; font-size: 20px; color: var(--accent); letter-spacing: -0.3px; }
  .logo span { color: var(--muted); font-style: italic; font-size: 16px; }
  .word-count { font-size: 12px; color: var(--muted); }

  .progress-track {
    height: 2px;
    background: var(--surface2);
    position: relative;
  }
  .progress-fill {
    height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    transition: width 0.4s ease;
  }

  .cat-scroll {
    display: flex;
    gap: 6px;
    padding: 10px 1.5rem;
    overflow-x: auto;
    scrollbar-width: none;
    border-bottom: 0.5px solid var(--border);
    flex-shrink: 0;
  }
  .cat-scroll::-webkit-scrollbar { display: none; }
  .cat-pill {
    flex-shrink: 0;
    padding: 5px 14px;
    border-radius: 20px;
    border: 0.5px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-size: 12px;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .cat-pill.active { background: var(--accent); color: #0e1117; border-color: var(--accent); font-weight: 500; }

  main { flex: 1; display: flex; flex-direction: column; padding: 1.5rem; gap: 1rem; }

  .card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 20px;
    padding: 2rem 1.5rem;
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    position: relative;
    min-height: 240px;
    transition: transform 0.2s;
  }
  .card.speaking { border-color: rgba(232,184,75,0.3); }

  .lang-tag {
    position: absolute;
    top: 1rem;
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 3px 12px;
    border-radius: 20px;
  }
  .lang-tag.en { background: rgba(91,184,160,0.15); color: var(--accent2); }
  .lang-tag.es { background: rgba(232,184,75,0.15); color: var(--accent); }

  .word-en {
    font-family: 'Fraunces', serif;
    font-size: clamp(26px, 8vw, 38px);
    font-weight: 400;
    color: var(--text);
    margin-bottom: 0.5rem;
    line-height: 1.2;
  }
  .word-es {
    font-family: 'Fraunces', serif;
    font-size: clamp(22px, 7vw, 34px);
    font-weight: 600;
    color: var(--accent);
    margin-bottom: 6px;
    display: none;
  }
  .pron {
    font-size: 14px;
    color: var(--muted);
    font-style: italic;
    display: none;
  }
  .cat-label {
    position: absolute;
    bottom: 1rem;
    right: 1.2rem;
    font-size: 11px;
    color: var(--muted);
    text-transform: capitalize;
  }

  .wave {
    display: none;
    align-items: center;
    gap: 3px;
    height: 24px;
    margin-bottom: 12px;
  }
  .wave.active { display: flex; }
  .wave span {
    display: block;
    width: 3px;
    border-radius: 3px;
    background: var(--accent);
    animation: wave 0.8s ease-in-out infinite;
  }
  .wave span:nth-child(1) { animation-delay: 0s; }
  .wave span:nth-child(2) { animation-delay: 0.1s; }
  .wave span:nth-child(3) { animation-delay: 0.2s; }
  .wave span:nth-child(4) { animation-delay: 0.3s; }
  .wave span:nth-child(5) { animation-delay: 0.4s; }
  @keyframes wave {
    0%, 100% { height: 6px; opacity: 0.4; }
    50% { height: 20px; opacity: 1; }
  }

  .nav-row {
    display: flex;
    gap: 10px;
    align-items: center;
  }
  .nav-btn {
    width: 44px; height: 44px;
    border-radius: 50%;
    border: 0.5px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    font-size: 18px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .nav-btn:active { transform: scale(0.93); }
  .nav-btn:disabled { opacity: 0.3; }

  .play-btn {
    flex: 1;
    height: 52px;
    border-radius: 14px;
    border: none;
    background: var(--accent);
    color: #0e1117;
    font-size: 15px;
    font-weight: 500;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: all 0.15s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .play-btn:active { transform: scale(0.97); }
  .play-btn.playing { background: var(--surface2); color: var(--text); border: 0.5px solid var(--border); }

  .secondary-row {
    display: flex;
    gap: 10px;
  }
  .sec-btn {
    flex: 1;
    height: 44px;
    border-radius: 12px;
    border: 0.5px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: all 0.15s;
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .sec-btn:active { transform: scale(0.97); background: var(--surface2); }
  .sec-btn.on { background: rgba(196,122,180,0.15); border-color: rgba(196,122,180,0.3); color: var(--accent3); }

  .settings-row {
    display: flex;
    gap: 1rem;
    align-items: center;
    padding: 0.75rem 1rem;
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 12px;
  }
  .settings-row label { font-size: 12px; color: var(--muted); flex-shrink: 0; }
  .settings-row input[type=range] {
    flex: 1;
    accent-color: var(--accent);
    height: 4px;
  }
  .settings-row .val { font-size: 12px; color: var(--text); min-width: 30px; text-align: right; }

  .status {
    text-align: center;
    font-size: 13px;
    color: var(--muted);
    min-height: 18px;
    font-style: italic;
  }

  .tip {
    text-align: center;
    font-size: 12px;
    color: var(--muted);
    padding-bottom: 0.5rem;
    opacity: 0.6;
  }
</style>
</head>
<body>

<header>
  <div class="logo">Español <span>flashcards</span></div>
  <div class="word-count" id="wordCount">1 / 100</div>
</header>
<div class="progress-track"><div class="progress-fill" id="progressFill" style="width:1%"></div></div>

<div class="cat-scroll" id="catScroll"></div>

<main>
  <div class="card" id="card">
    <div class="lang-tag en" id="langTag">English</div>
    <div class="wave" id="wave">
      <span></span><span></span><span></span><span></span><span></span>
    </div>
    <div class="word-en" id="wordEn">—</div>
    <div class="word-es" id="wordEs"></div>
    <div class="pron" id="wordPron"></div>
    <div class="cat-label" id="catLabel"></div>
  </div>

  <div class="nav-row">
    <button class="nav-btn" id="prevBtn" onclick="navigate(-1)" title="Previous">‹</button>
    <button class="play-btn" id="playBtn" onclick="playCard()">
      <span id="playIcon">▶</span> <span id="playLabel">Play word</span>
    </button>
    <button class="nav-btn" id="nextBtn" onclick="navigate(1)" title="Next">›</button>
  </div>

  <div class="secondary-row">
    <button class="sec-btn" id="autoBtn" onclick="toggleAuto()">⟳ Auto-play all</button>
    <button class="sec-btn" onclick="shuffleWords()">⇌ Shuffle</button>
  </div>

  <div class="settings-row">
    <label>Speed</label>
    <input type="range" min="0.5" max="1.5" step="0.1" value="0.85" id="speedSlider">
    <span class="val" id="speedVal">0.9×</span>
    <label>Pause</label>
    <input type="range" min="0.5" max="3" step="0.5" value="1.5" id="pauseSlider">
    <span class="val" id="pauseVal">1.5s</span>
  </div>

  <div class="status" id="status"></div>
  <div class="tip">Swipe left/right to navigate • Tap card to reveal Spanish</div>
</main>

<script>
const WORDS = [
  {en:"yes",es:"sí",pron:"see",cat:"basics"},
  {en:"no",es:"no",pron:"noh",cat:"basics"},
  {en:"please",es:"por favor",pron:"por fah-BOR",cat:"basics"},
  {en:"thank you",es:"gracias",pron:"GRAH-see-as",cat:"basics"},
  {en:"you're welcome",es:"de nada",pron:"deh NAH-dah",cat:"basics"},
  {en:"excuse me",es:"perdón",pron:"pehr-DON",cat:"basics"},
  {en:"sorry",es:"lo siento",pron:"loh see-EN-toh",cat:"basics"},
  {en:"hello",es:"hola",pron:"OH-lah",cat:"greetings"},
  {en:"goodbye",es:"adiós",pron:"ah-dee-OHS",cat:"greetings"},
  {en:"good morning",es:"buenos días",pron:"BWEH-nos DEE-as",cat:"greetings"},
  {en:"good afternoon",es:"buenas tardes",pron:"BWEH-nas TAR-des",cat:"greetings"},
  {en:"good night",es:"buenas noches",pron:"BWEH-nas NOH-ches",cat:"greetings"},
  {en:"how are you",es:"¿cómo estás?",pron:"KOH-moh es-TAS",cat:"greetings"},
  {en:"I",es:"yo",pron:"yoh",cat:"pronouns"},
  {en:"you",es:"tú",pron:"too",cat:"pronouns"},
  {en:"he",es:"él",pron:"el",cat:"pronouns"},
  {en:"she",es:"ella",pron:"EH-yah",cat:"pronouns"},
  {en:"we",es:"nosotros",pron:"noh-SOH-tros",cat:"pronouns"},
  {en:"they",es:"ellos",pron:"EH-yos",cat:"pronouns"},
  {en:"to be",es:"ser / estar",pron:"sehr / es-TAR",cat:"verbs"},
  {en:"to have",es:"tener",pron:"teh-NEHR",cat:"verbs"},
  {en:"to want",es:"querer",pron:"keh-REHR",cat:"verbs"},
  {en:"to need",es:"necesitar",pron:"neh-seh-see-TAR",cat:"verbs"},
  {en:"to go",es:"ir",pron:"eer",cat:"verbs"},
  {en:"to come",es:"venir",pron:"beh-NEER",cat:"verbs"},
  {en:"to eat",es:"comer",pron:"koh-MEHR",cat:"verbs"},
  {en:"to drink",es:"beber",pron:"beh-BEHR",cat:"verbs"},
  {en:"to speak",es:"hablar",pron:"ah-BLAR",cat:"verbs"},
  {en:"to understand",es:"entender",pron:"en-ten-DEHR",cat:"verbs"},
  {en:"to know",es:"saber",pron:"sah-BEHR",cat:"verbs"},
  {en:"to see",es:"ver",pron:"behr",cat:"verbs"},
  {en:"to give",es:"dar",pron:"dar",cat:"verbs"},
  {en:"to take",es:"tomar",pron:"toh-MAR",cat:"verbs"},
  {en:"to make",es:"hacer",pron:"ah-SEHR",cat:"verbs"},
  {en:"to work",es:"trabajar",pron:"trah-bah-HAR",cat:"verbs"},
  {en:"to live",es:"vivir",pron:"bee-BEER",cat:"verbs"},
  {en:"to like",es:"gustar",pron:"goos-TAR",cat:"verbs"},
  {en:"can / to be able to",es:"poder",pron:"poh-DEHR",cat:"verbs"},
  {en:"where",es:"dónde",pron:"DON-deh",cat:"questions"},
  {en:"what",es:"qué",pron:"keh",cat:"questions"},
  {en:"who",es:"quién",pron:"kee-EN",cat:"questions"},
  {en:"when",es:"cuándo",pron:"KWAHN-doh",cat:"questions"},
  {en:"why",es:"por qué",pron:"por KEH",cat:"questions"},
  {en:"how",es:"cómo",pron:"KOH-moh",cat:"questions"},
  {en:"how much",es:"cuánto",pron:"KWAHN-toh",cat:"questions"},
  {en:"the",es:"el / la",pron:"el / lah",cat:"articles"},
  {en:"a / an",es:"un / una",pron:"oon / OO-nah",cat:"articles"},
  {en:"and",es:"y",pron:"ee",cat:"connectors"},
  {en:"or",es:"o",pron:"oh",cat:"connectors"},
  {en:"but",es:"pero",pron:"PEH-roh",cat:"connectors"},
  {en:"because",es:"porque",pron:"POR-keh",cat:"connectors"},
  {en:"if",es:"si",pron:"see",cat:"connectors"},
  {en:"with",es:"con",pron:"kon",cat:"prepositions"},
  {en:"without",es:"sin",pron:"seen",cat:"prepositions"},
  {en:"for",es:"para",pron:"PAH-rah",cat:"prepositions"},
  {en:"in",es:"en",pron:"en",cat:"prepositions"},
  {en:"on",es:"sobre",pron:"SOH-breh",cat:"prepositions"},
  {en:"at",es:"a",pron:"ah",cat:"prepositions"},
  {en:"from",es:"de",pron:"deh",cat:"prepositions"},
  {en:"to",es:"a",pron:"ah",cat:"prepositions"},
  {en:"good",es:"bueno",pron:"BWEH-noh",cat:"adjectives"},
  {en:"bad",es:"malo",pron:"MAH-loh",cat:"adjectives"},
  {en:"big",es:"grande",pron:"GRAN-deh",cat:"adjectives"},
  {en:"small",es:"pequeño",pron:"peh-KEH-nyoh",cat:"adjectives"},
  {en:"hot",es:"caliente",pron:"kah-lee-EN-teh",cat:"adjectives"},
  {en:"cold",es:"frío",pron:"FREE-oh",cat:"adjectives"},
  {en:"new",es:"nuevo",pron:"NWEH-boh",cat:"adjectives"},
  {en:"old",es:"viejo",pron:"bee-EH-hoh",cat:"adjectives"},
  {en:"open",es:"abierto",pron:"ah-bee-EHR-toh",cat:"adjectives"},
  {en:"closed",es:"cerrado",pron:"seh-RAH-doh",cat:"adjectives"},
  {en:"one",es:"uno",pron:"OO-noh",cat:"numbers"},
  {en:"two",es:"dos",pron:"dohs",cat:"numbers"},
  {en:"three",es:"tres",pron:"trehs",cat:"numbers"},
  {en:"ten",es:"diez",pron:"dee-EHS",cat:"numbers"},
  {en:"hundred",es:"cien",pron:"see-EN",cat:"numbers"},
  {en:"water",es:"agua",pron:"AH-gwah",cat:"nouns"},
  {en:"food",es:"comida",pron:"koh-MEE-dah",cat:"nouns"},
  {en:"house",es:"casa",pron:"KAH-sah",cat:"nouns"},
  {en:"money",es:"dinero",pron:"dee-NEH-roh",cat:"nouns"},
  {en:"time",es:"tiempo",pron:"tee-EM-poh",cat:"nouns"},
  {en:"day",es:"día",pron:"DEE-ah",cat:"nouns"},
  {en:"night",es:"noche",pron:"NOH-cheh",cat:"nouns"},
  {en:"friend",es:"amigo",pron:"ah-MEE-goh",cat:"nouns"},
  {en:"man",es:"hombre",pron:"OM-breh",cat:"nouns"},
  {en:"woman",es:"mujer",pron:"moo-HEHR",cat:"nouns"},
  {en:"here",es:"aquí",pron:"ah-KEE",cat:"place"},
  {en:"there",es:"allí",pron:"ah-YEE",cat:"place"},
  {en:"now",es:"ahora",pron:"ah-OH-rah",cat:"time"},
  {en:"later",es:"después",pron:"des-PWES",cat:"time"},
  {en:"today",es:"hoy",pron:"oy",cat:"time"},
  {en:"tomorrow",es:"mañana",pron:"mah-NYAH-nah",cat:"time"},
  {en:"yesterday",es:"ayer",pron:"ah-YEHR",cat:"time"},
  {en:"always",es:"siempre",pron:"see-EM-preh",cat:"time"},
  {en:"never",es:"nunca",pron:"NOON-kah",cat:"time"},
  {en:"very",es:"muy",pron:"mwee",cat:"adverbs"},
  {en:"also",es:"también",pron:"tam-bee-EN",cat:"adverbs"},
  {en:"more",es:"más",pron:"mas",cat:"adverbs"},
  {en:"less",es:"menos",pron:"MEH-nos",cat:"adverbs"},
];

let words = [...WORDS];
let current = 0;
let autoPlay = false;
let speaking = false;
let revealed = false;
let activeCat = "all";

// Category pills
const cats = ["all", ...new Set(WORDS.map(w => w.cat))];
const catScroll = document.getElementById("catScroll");
cats.forEach(cat => {
  const b = document.createElement("button");
  b.className = "cat-pill" + (cat === "all" ? " active" : "");
  b.textContent = cat;
  b.onclick = () => {
    activeCat = cat;
    document.querySelectorAll(".cat-pill").forEach(x => x.classList.remove("active"));
    b.classList.add("active");
    words = cat === "all" ? [...WORDS] : WORDS.filter(w => w.cat === cat);
    current = 0;
    stopAuto();
    renderCard();
  };
  catScroll.appendChild(b);
});

// Settings
document.getElementById("speedSlider").oninput = function() {
  document.getElementById("speedVal").textContent = parseFloat(this.value).toFixed(1) + "×";
};
document.getElementById("pauseSlider").oninput = function() {
  document.getElementById("pauseVal").textContent = parseFloat(this.value).toFixed(1) + "s";
};
function getSpeed() { return parseFloat(document.getElementById("speedSlider").value); }
function getPause() { return parseFloat(document.getElementById("pauseSlider").value) * 1000; }

function renderCard(phase) {
  const w = words[current];
  revealed = phase === "es";

  const pct = ((current + 1) / words.length * 100).toFixed(1);
  document.getElementById("progressFill").style.width = pct + "%";
  document.getElementById("wordCount").textContent = (current + 1) + " / " + words.length;
  document.getElementById("wordEn").textContent = w.en;
  document.getElementById("catLabel").textContent = w.cat;

  const tag = document.getElementById("langTag");
  const es = document.getElementById("wordEs");
  const pron = document.getElementById("wordPron");

  if (phase === "es") {
    tag.className = "lang-tag es";
    tag.textContent = "Español";
    es.style.display = "block";
    es.textContent = w.es;
    pron.style.display = "block";
    pron.textContent = w.pron;
  } else {
    tag.className = "lang-tag en";
    tag.textContent = "English";
    es.style.display = "none";
    pron.style.display = "none";
  }
}

function setWave(on) {
  document.getElementById("wave").classList.toggle("active", on);
  document.getElementById("card").classList.toggle("speaking", on);
}

function setStatus(msg) { document.getElementById("status").textContent = msg; }

function setPlayUI(playing) {
  const btn = document.getElementById("playBtn");
  btn.classList.toggle("playing", playing);
  document.getElementById("playIcon").textContent = playing ? "■" : "▶";
  document.getElementById("playLabel").textContent = playing ? "Stop" : "Play word";
}

function speak(text, lang, rate, onDone) {
  if (!window.speechSynthesis) { if (onDone) onDone(); return; }
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = lang;
  u.rate = rate;
  u.onend = () => { setWave(false); if (onDone) onDone(); };
  u.onerror = () => { setWave(false); if (onDone) onDone(); };
  setWave(true);
  window.speechSynthesis.speak(u);
}

function playCard() {
  if (speaking) {
    window.speechSynthesis && window.speechSynthesis.cancel();
    speaking = false;
    setWave(false);
    setPlayUI(false);
    setStatus("");
    return;
  }
  const w = words[current];
  const rate = getSpeed();
  const pause = getPause();
  speaking = true;
  setPlayUI(true);
  setStatus("English…");
  renderCard("en");
  speak(w.en, "en-US", rate, () => {
    if (!speaking) return;
    setTimeout(() => {
      if (!speaking) return;
      setStatus("Español…");
      renderCard("es");
      speak(w.es.replace(/\//g, " or "), "es-MX", rate * 0.85, () => {
        speaking = false;
        setPlayUI(false);
        setStatus("");
        if (autoPlay) {
          setTimeout(() => {
            if (!autoPlay) return;
            if (current < words.length - 1) {
              current++;
              renderCard();
              playCard();
            } else {
              stopAuto();
              setStatus("All " + words.length + " words complete! ¡Bien hecho!");
            }
          }, pause);
        }
      });
    }, pause * 0.5);
  });
}

function stopAuto() {
  autoPlay = false;
  speaking = false;
  window.speechSynthesis && window.speechSynthesis.cancel();
  setWave(false);
  setPlayUI(false);
  document.getElementById("autoBtn").textContent = "⟳ Auto-play all";
  document.getElementById("autoBtn").classList.remove("on");
  setStatus("");
}

function toggleAuto() {
  if (autoPlay) { stopAuto(); return; }
  autoPlay = true;
  document.getElementById("autoBtn").textContent = "⏹ Stop all";
  document.getElementById("autoBtn").classList.add("on");
  playCard();
}

function navigate(dir) {
  stopAuto();
  current = Math.max(0, Math.min(words.length - 1, current + dir));
  renderCard();
}

function shuffleWords() {
  stopAuto();
  for (let i = words.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [words[i], words[j]] = [words[j], words[i]];
  }
  current = 0;
  renderCard();
  setStatus("Shuffled! ¡Vamos!");
  setTimeout(() => setStatus(""), 2000);
}

// Tap card to reveal Spanish
document.getElementById("card").addEventListener("click", () => {
  if (!speaking) {
    if (!revealed) renderCard("es");
    else renderCard("en");
  }
});

// Swipe support
let touchStartX = 0;
document.addEventListener("touchstart", e => { touchStartX = e.touches[0].clientX; }, {passive: true});
document.addEventListener("touchend", e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(dx) > 50) navigate(dx < 0 ? 1 : -1);
}, {passive: true});

renderCard();
</script>
</body>
</html>
